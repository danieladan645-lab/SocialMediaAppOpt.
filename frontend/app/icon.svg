<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#141418"/>

  <!-- Grid lines -->
  <line x1="72" y1="176" x2="440" y2="176" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <line x1="72" y1="256" x2="440" y2="256" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <line x1="72" y1="336" x2="440" y2="336" stroke="#ffffff" stroke-width="1" opacity="0.06"/>

  <!-- Baseline -->
  <line x1="72" y1="416" x2="440" y2="416" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>

  <!-- Bars (ascending left to right) -->
  <rect x="88"  y="256" width="60" height="160" rx="10" fill="#3DBFBF" opacity="0.35"/>
  <rect x="180" y="200" width="60" height="216" rx="10" fill="#3DBFBF" opacity="0.55"/>
  <rect x="272" y="144" width="60" height="272" rx="10" fill="#3DBFBF" opacity="0.75"/>
  <rect x="364" y="86"  width="60" height="330" rx="10" fill="#3DBFBF"/>

  <!-- Audit scan line -->
  <line x1="72" y1="296" x2="440" y2="296" stroke="#E8604C" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Data intercept points -->
  <circle cx="118" cy="296" r="8" fill="#E8604C"/>
  <circle cx="210" cy="296" r="8" fill="#E8604C"/>
  <circle cx="302" cy="296" r="8" fill="#E8604C"/>
  <circle cx="394" cy="296" r="8" fill="#E8604C"/>
</svg>
